services:
  - type: web
    name: prohypo-asistent
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webapp:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: FLASK_DEBUG
        value: "0"
