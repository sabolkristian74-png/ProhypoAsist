services:
  - type: web
    name: prohypo-asistent
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python webapp.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: FLASK_DEBUG
        value: "0"
